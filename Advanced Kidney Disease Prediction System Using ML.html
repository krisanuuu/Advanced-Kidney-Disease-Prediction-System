<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kidney Disease Prediction System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fb;
color:#333;
}

header{
background:#2c7be5;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:20px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h2{
margin-bottom:15px;
color:#2c7be5;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

label{
font-weight:600;
}

input,
select,
textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
resize:none;
height:80px;
}

.btn{
display:block;
width:100%;
padding:14px;
background:#2c7be5;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

.btn:hover{
background:#1d63c9;
}

.downloadBtn{
display:block;
width:100%;
padding:14px;
background:#28a745;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

.downloadBtn:hover{
background:#1f7d35;
}

.resultBox{
background:#eef9f1;
padding:25px;
margin-top:20px;
border-radius:10px;
line-height:2;
}

footer{
text-align:center;
padding:15px;
background:#2c7be5;
color:white;
margin-top:20px;
font-size:15px;
}

</style>

</head>

<body>

<header>
Kidney Disease Prediction System
</header>

<div class="container">

<!-- Patient Information -->

<div class="card">

<h2>👤 Patient Information</h2>

<div class="grid">

<div>
<label>Patient Name</label>
<input type="text" id="name">
</div>

<div>
<label>Age / Sex</label>
<input type="text" id="ageSex">
</div>

<div>
<label>Date</label>
<input type="date" id="date">
</div>

</div>

</div>

<!-- Symptoms -->

<div class="card">

<h2>🩺 Symptoms</h2>

<div class="grid">

<label><input type="checkbox"> Swelling (Edema)</label>

<label><input type="checkbox"> Decreased urine</label>

<label><input type="checkbox"> Increased urine</label>

<label><input type="checkbox"> Fatigue</label>

<label><input type="checkbox"> Fever</label>

<label><input type="checkbox"> Pain during urination</label>

</div>

</div>

<!-- Medical History -->

<div class="card">

<h2>📜 Medical History</h2>

<div class="grid">

<div>
<label>Diabetes</label>
<select id="diabetes">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div>
<label>Hypertension</label>
<select id="hypertension">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div>
<label>Drug History</label>
<input type="text">
</div>

<div>
<label>Family History</label>
<input type="text">
</div>

</div>

</div>

<!-- Physical Examination -->

<div class="card">

<h2>💓 Physical Examination</h2>

<div class="grid">

<div>
<label>Blood Pressure</label>
<input type="number" id="bp" placeholder="mmHg">
</div>

<div>
<label>Pulse</label>
<input type="number" placeholder="bpm">
</div>

<div>
<label>Weight</label>
<input type="number" placeholder="kg">
</div>

</div>

</div>

<!-- Laboratory -->

<div class="card">

<h2>🧪 Laboratory Investigations</h2>

<h3>🔹 Blood Tests</h3>

<div class="grid">

<div>
<label>Serum Creatinine (mg/dL)</label>
<input type="number" step="0.1" id="creatinine">
</div>

<div>
<label>Blood Urea (BUN)</label>
<input type="number" id="bun">
</div>

<div>
<label>Hemoglobin (Hb)</label>
<input type="number" step="0.1" id="hb">
</div>

<div>
<label>Blood Glucose</label>
<input type="number" id="glucose">
</div>

</div>

<h3 style="margin-top:20px;">🔹 Urine Analysis</h3>

<div class="grid">

<div>
<label>Protein</label>
<select id="protein">
<option value="0">Nil</option>
<option value="1">+</option>
<option value="2">++</option>
<option value="3">+++</option>
</select>
</div>

<div>
<label>Culture</label>
<select id="culture">
<option>Negative</option>
<option>Positive</option>
</select>
</div>

</div>

<h3 style="margin-top:20px;">🔹 Kidney Function</h3>

<div class="grid">

<div>
<label>eGFR</label>
<input type="number" id="egfr">
</div>

</div>

</div>

<!-- Imaging -->

<div class="card">

<h2>🧫 Ultrasound KUB</h2>

<div class="grid">

<div>
<label>Kidney Stones</label>
<select id="stones">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div>
<label>Obstruction</label>
<select id="obstruction">
<option>No</option>
<option>Yes</option>
</select>
</div>

</div>

</div>

<!-- Button -->

<button class="btn" onclick="predictDisease()">
🔍 Predict & Generate Report
</button>

<div id="resultContainer"></div>

</div>

<footer>
Developed by KRISANU U S
</footer>

<script>

function predictDisease(){

// Input Values

let creatinine =
document.getElementById("creatinine").value;

let egfr =
document.getElementById("egfr").value;

let hb =
document.getElementById("hb").value;

let bp =
document.getElementById("bp").value;


// Validation

if(
creatinine === "" &&
egfr === "" &&
hb === "" &&
bp === ""
){

alert("⚠️ Please enter patient values before prediction.");

return;

}


// Convert to Numbers

creatinine = parseFloat(creatinine);

egfr = parseFloat(egfr);

hb = parseFloat(hb);

bp = parseFloat(bp);


// Other Inputs

let protein =
parseInt(document.getElementById("protein").value);

let diabetes =
document.getElementById("diabetes").value;

let hypertension =
document.getElementById("hypertension").value;

let culture =
document.getElementById("culture").value;

let stones =
document.getElementById("stones").value;

let obstruction =
document.getElementById("obstruction").value;

let patientName =
document.getElementById("name").value || "Not Provided";

let ageSex =
document.getElementById("ageSex").value || "Not Provided";

let reportDate =
document.getElementById("date").value || "Not Provided";

let symptoms =
[...document.querySelectorAll("input[type='checkbox']:checked")]
.map(c=>c.parentElement.textContent.trim());

let generatedTime =
new Date().toLocaleTimeString();


// CKD Stage

let ckdStage = "Not Available";

if(!isNaN(egfr)){

if(egfr >= 90){
ckdStage = "Stage 1";
}

else if(egfr >= 60){
ckdStage = "Stage 2";
}

else if(egfr >= 30){
ckdStage = "Stage 3";
}

else if(egfr >= 15){
ckdStage = "Stage 4";
}

else{
ckdStage = "Stage 5";
}

}


// Score Calculation

let score = 0;

if(!isNaN(creatinine) && creatinine > 1.5)
score += 2;

if(!isNaN(egfr) && egfr < 60)
score += 3;

if(protein >= 2)
score += 2;

if(!isNaN(bp) && bp > 140)
score += 1;

if(diabetes === "Yes")
score += 1;

if(hypertension === "Yes")
score += 1;

if(!isNaN(hb) && hb < 10)
score += 2;


// Prediction

let disease = "Normal Kidney Function";

let risk = "Low";

let treatment =
"Maintain healthy lifestyle and hydration.";


// Kidney Failure

if(
!isNaN(creatinine) &&
!isNaN(egfr) &&
(creatinine > 5 || egfr < 15)
){

disease = "Kidney Failure";

risk = "Very High";

treatment =
"Immediate dialysis or kidney transplant consultation required.";

}


// CKD

else if(score >= 6){

disease = "Chronic Kidney Disease (CKD)";

risk = "High";

treatment =
"Low salt diet, BP control, avoid NSAIDs and consult nephrologist.";

}


// AKI

else if(
!isNaN(creatinine) &&
creatinine > 2 &&
symptoms.some(s=>s.includes("Decreased"))
){

disease = "Acute Kidney Injury";

risk = "High";

treatment =
"Hospital monitoring and IV fluids required.";

}


// UTI

else if(
culture === "Positive" &&
symptoms.some(s=>s.includes("Pain"))
){

disease = "Urinary Tract Infection";

risk = "Moderate";

treatment =
"Antibiotics and hydration.";

}


// Kidney Stones

else if(stones === "Yes"){

disease = "Kidney Stones";

risk = "Moderate";

treatment =
"Increase water intake and pain management.";

}


// Obstructive Uropathy

else if(obstruction === "Yes"){

disease = "Obstructive Uropathy";

risk = "High";

treatment =
"Further surgical evaluation required.";

}


// Nephrotic Syndrome

else if(protein >= 2){

disease = "Nephrotic Syndrome";

risk = "High";

treatment =
"Protein control diet and steroid therapy.";

}


// Recommendation

let recommendation =
"Routine follow-up recommended.";

if(risk === "High"){

recommendation =
"Consult nephrologist immediately.";

}

if(risk === "Very High"){

recommendation =
"Emergency medical attention required.";

}


// Result Display

document.getElementById("resultContainer").innerHTML = `

<div class="resultBox" id="reportContent">

<h2 style="color:#2c7be5;">
🩺 Kidney Diagnosis Report
</h2>

<hr style="margin:15px 0;">

<p><strong>👤 Patient Name:</strong> ${patientName}</p>

<p><strong>📅 Date:</strong> ${reportDate}</p>

<p><strong>🕒 Generated Time:</strong> ${generatedTime}</p>

<p><strong>🧑 Age / Sex:</strong> ${ageSex}</p>

<br>

<p><strong>🧪 Predicted Disease:</strong> ${disease}</p>

<p><strong>⚠️ Risk Level:</strong> ${risk}</p>

<p><strong>📊 CKD Stage:</strong> ${ckdStage}</p>

<p><strong>💊 Treatment Suggestion:</strong> ${treatment}</p>

<p><strong>📌 Recommendation:</strong> ${recommendation}</p>

</div>

<button class="downloadBtn"
onclick="downloadPDF()">
📄 Download PDF
</button>

`;

}


// PDF Download

function downloadPDF(){

const content =
document.getElementById("reportContent").innerHTML;

let printWindow =
window.open('', '', 'width=900,height=700');

printWindow.document.write(`

<html>

<head>

<title>Kidney Disease Report</title>

<style>

body{
font-family:Arial;
padding:30px;
line-height:2;
}

h2{
color:#2c7be5;
}

p{
font-size:18px;
}

</style>

</head>

<body>

${content}

</body>

</html>

`);

printWindow.document.close();

printWindow.focus();

printWindow.print();

}

</script>

</body>

</html>
